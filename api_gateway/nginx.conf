worker_processes  1;

events {
    worker_connections  1024;
}

http {
    include       C:/nginx/conf/mime.types;
    default_type  application/octet-stream;

    sendfile on;
    keepalive_timeout 90;
    client_max_body_size 50m;
    server_tokens off;

    log_format gateway_log '$remote_addr - [$time_local] "$request" '
                           'status=$status body=$body_bytes_sent '
                           'request_time=$request_time '
                           'upstream_time=$upstream_response_time '
                           'upstream_addr=$upstream_addr';

    access_log C:/nginx/logs/gateway_access.log gateway_log;
    error_log  C:/nginx/logs/gateway_error.log warn;

    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=20r/m;
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=120r/m;
    limit_req_zone $binary_remote_addr zone=media_limit:10m rate=60r/m;
    limit_req_status 429;

    upstream iam_service {
        server 127.0.0.1:8000;
        keepalive 16;
    }

    upstream core_service {
        server 127.0.0.1:8001;
        keepalive 16;
    }

    upstream media_service {
        server 127.0.0.1:8002;
        keepalive 16;
    }

    server {
        listen 8080;
        server_name localhost 127.0.0.1;

        add_header X-Gateway "Nikookari-Nginx-API-Gateway" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;

        location = /gateway-health {
            default_type application/json;
            return 200 '{"status":"ok","service":"api-gateway","message":"Nikookari API Gateway is running"}';
        }

        location = /gateway-info {
            default_type application/json;
            return 200 '{"gateway":"nginx","port":8080,"iam_service":"127.0.0.1:8000","core_service":"127.0.0.1:8001","media_service":"127.0.0.1:8002","docs":{"iam":"/iam-docs","core":"/core-docs","media":"/media-docs"}}';
        }

        location = /iam-health {
            proxy_pass http://iam_service/health;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $http_host;
            proxy_set_header Authorization $http_authorization;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 10s;
            proxy_send_timeout 120s;
            proxy_read_timeout 120s;
            proxy_next_upstream error timeout http_502 http_503 http_504;
        }

        location = /core-health {
            proxy_pass http://core_service/health;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $http_host;
            proxy_set_header Authorization $http_authorization;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 10s;
            proxy_send_timeout 120s;
            proxy_read_timeout 120s;
            proxy_next_upstream error timeout http_502 http_503 http_504;
        }

        location = /media-health {
            proxy_pass http://media_service/health;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $http_host;
            proxy_set_header Authorization $http_authorization;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 10s;
            proxy_send_timeout 120s;
            proxy_read_timeout 120s;
            proxy_next_upstream error timeout http_502 http_503 http_504;
        }

        location = /iam-docs {
            proxy_pass http://iam_service/docs;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $http_host;
            proxy_set_header Accept-Encoding "";

            sub_filter_once off;
            sub_filter_types text/html;
            sub_filter "url: '/openapi.json'" "url: '/iam-openapi.json'";
            sub_filter 'url: "/openapi.json"' 'url: "/iam-openapi.json"';

            proxy_connect_timeout 10s;
            proxy_send_timeout 120s;
            proxy_read_timeout 120s;
        }

        location = /core-docs {
            proxy_pass http://core_service/docs;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $http_host;
            proxy_set_header Accept-Encoding "";

            sub_filter_once off;
            sub_filter_types text/html;
            sub_filter "url: '/openapi.json'" "url: '/core-openapi.json'";
            sub_filter 'url: "/openapi.json"' 'url: "/core-openapi.json"';

            proxy_connect_timeout 10s;
            proxy_send_timeout 120s;
            proxy_read_timeout 120s;
        }

        location = /media-docs {
            proxy_pass http://media_service/docs;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $http_host;
            proxy_set_header Accept-Encoding "";

            sub_filter_once off;
            sub_filter_types text/html;
            sub_filter "url: '/openapi.json'" "url: '/media-openapi.json'";
            sub_filter 'url: "/openapi.json"' 'url: "/media-openapi.json"';

            proxy_connect_timeout 10s;
            proxy_send_timeout 120s;
            proxy_read_timeout 120s;
        }

        location = /iam-openapi.json {
            proxy_pass http://iam_service/openapi.json;
        }

        location = /core-openapi.json {
            proxy_pass http://core_service/openapi.json;
        }

        location = /media-openapi.json {
            proxy_pass http://media_service/openapi.json;
        }

        location /api/v1/auth/ {
            limit_req zone=auth_limit burst=5 nodelay;

            proxy_pass http://iam_service;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $http_host;
            proxy_set_header Authorization $http_authorization;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 10s;
            proxy_send_timeout 120s;
            proxy_read_timeout 120s;
            proxy_next_upstream error timeout http_502 http_503 http_504;
        }

        location /api/v1/profile/ {
            limit_req zone=api_limit burst=30 nodelay;

            proxy_pass http://iam_service;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $http_host;
            proxy_set_header Authorization $http_authorization;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 10s;
            proxy_send_timeout 120s;
            proxy_read_timeout 120s;
            proxy_next_upstream error timeout http_502 http_503 http_504;
        }

        location /api/v1/admin/ {
            limit_req zone=api_limit burst=30 nodelay;

            proxy_pass http://iam_service;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $http_host;
            proxy_set_header Authorization $http_authorization;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 10s;
            proxy_send_timeout 120s;
            proxy_read_timeout 120s;
            proxy_next_upstream error timeout http_502 http_503 http_504;
        }

        location /api/v1/charity-verification-requests {
            limit_req zone=api_limit burst=30 nodelay;

            proxy_pass http://core_service;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $http_host;
            proxy_set_header Authorization $http_authorization;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 10s;
            proxy_send_timeout 120s;
            proxy_read_timeout 120s;
            proxy_next_upstream error timeout http_502 http_503 http_504;
        }

        location /api/v1/verifier {
            limit_req zone=api_limit burst=30 nodelay;

            proxy_pass http://core_service;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $http_host;
            proxy_set_header Authorization $http_authorization;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 10s;
            proxy_send_timeout 120s;
            proxy_read_timeout 120s;
            proxy_next_upstream error timeout http_502 http_503 http_504;
        }

        location /api/v1/notifications {
            limit_req zone=api_limit burst=30 nodelay;

            proxy_pass http://core_service;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $http_host;
            proxy_set_header Authorization $http_authorization;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 10s;
            proxy_send_timeout 120s;
            proxy_read_timeout 120s;
            proxy_next_upstream error timeout http_502 http_503 http_504;
        }

        location /api/v1/media {
            limit_req zone=media_limit burst=15 nodelay;

            proxy_pass http://media_service;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $http_host;
            proxy_set_header Authorization $http_authorization;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_request_buffering off;
            proxy_connect_timeout 10s;
            proxy_send_timeout 300s;
            proxy_read_timeout 300s;
            proxy_next_upstream error timeout http_502 http_503 http_504;
        }

        location = /docs {
            return 302 /iam-docs;
        }

        location = /openapi.json {
            return 302 /iam-openapi.json;
        }

        error_page 502 503 504 = /gateway-error;

        location = /gateway-error {
            default_type application/json;
            return 502 '{"status":"error","message":"Upstream service is not available through API Gateway"}';
        }

        location / {
            default_type application/json;
            return 404 '{"status":"error","message":"Route not found in API Gateway"}';
        }
    }
}